<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>A/S Admin - 접수내역</title>
<link rel="stylesheet" href="css/style.css">
<script src="css/partials.js"></script>
<style>
  .order-table { width: 100%; }
  .order-table td.cu { text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 130px; }
  .order-table td.product { white-space: nowrap; text-align: center; }
  .toolbar2 { width: 730px; margin: 6px auto 0; text-align: right; color: #888; font-size: 11px; }
</style>
</head>
<body>
<div class="app">
  <header class="app-header" id="app-header"></header>

  <main class="app-main">
    <div class="content-wrap">
      <div class="page-title">A/S 접수내역</div>

      <table class="outer-table"><tr><td>

        <!-- 검색 -->
        <table class="search-box">
          <form name="frm1" onsubmit="event.preventDefault();applyFilter();">
          <tr>
            <td colspan="2">
              <select id="f_name">
                <option value="cu_name" selected>고객명</option>
                <option value="product">제품명</option>
                <option value="phone">전화번호</option>
                <option value="serial">시리얼번호</option>
              </select>
              <input type="text" id="f_value" value="">
              <input type="submit" value="검색">
              <input type="button" value="신규등록" onclick="location.href='order-new.html'">
              <input type="button" value="초기화" onclick="resetFilter()">
            </td>
          </tr>
          </form>

          <tr>
            <td class="alt">
              <label><input type="radio" name="re_now" value="" checked onchange="applyFilter()">전체</label>
              <label><input type="radio" name="re_now" value="접수" onchange="applyFilter()">접수</label>
              <label><input type="radio" name="re_now" value="진행" onchange="applyFilter()">진행</label>
              <label><input type="radio" name="re_now" value="센터" onchange="applyFilter()">센터</label>
              <label><input type="radio" name="re_now" value="견적" onchange="applyFilter()">견적</label>
              <label><input type="radio" name="re_now" value="택배" onchange="applyFilter()">택배</label>
              <label><input type="radio" name="re_now" value="완료" onchange="applyFilter()">완료</label>
              <label><input type="radio" name="re_now" value="출고" onchange="applyFilter()">출고</label>
            </td>
            <td class="alt">검색된 게시물수 : <b id="hitCount">0</b>건</td>
          </tr>
        </table>

        <div class="toolbar2"><span id="harvestStatus"></span></div>

        <!-- 빠른 상태 탭 -->
        <div class="status-tabs" id="statusTabs">
          <a href="#" data-status="" class="active">전체</a> |
          <a href="#" data-status="접수">접수</a> |
          <a href="#" data-status="진행">진행</a> |
          <a href="#" data-status="센터">센터</a> |
          <a href="#" data-status="견적">견적</a> |
          <a href="#" data-status="택배">택배</a> |
          <a href="#" data-status="완료">완료</a> |
          <a href="#" data-status="출고">출고</a>
        </div>

        <!-- 목록 테이블 -->
        <table class="data-table order-table">
          <thead>
            <tr>
              <th width="80">접수번호</th>
              <th width="55">요청</th>
              <th width="55">상태</th>
              <th width="120">고객명</th>
              <th>제품명</th>
              <th width="90">시리얼번호</th>
              <th width="75">처리일</th>
              <th width="65">접수자</th>
              <th width="45">삭제</th>
            </tr>
          </thead>
          <tbody id="orderBody">
            <tr><td colspan="9">로딩 중…</td></tr>
          </tbody>
        </table>

        <!-- 페이지네이션 -->
        <div class="center" style="margin-top:10px;">
          <span id="pageInfo"></span>
          <div id="pager" style="margin-top:6px;"></div>
        </div>

      </td></tr></table>
    </div>
  </main>

  <footer class="app-footer" id="app-footer"></footer>
</div>

<script>
// 원본에서 그대로 가져온 실데이터 (orders.json 이 없을 때 사용)
const FALLBACK_ORDERS = [
  { seq_no: 54824, order_no: "260429-9",  branch: "대구", cu_name: "숲속예은유치원",            status: "접수", product: "PC 출장요청",      serial: "슬기반",   process_date: "2026/04/29", receiver: "조이준",  kind2: "일반" },
  { seq_no: 54823, order_no: "260429-8",  branch: "대구", cu_name: "늑대(영천점)",              status: "택배", product: "토너납품",         serial: "8370 정품", process_date: "2026/04/29", receiver: "우은숙",  kind2: "일반" },
  { seq_no: 54822, order_no: "260429-7",  branch: "대구", cu_name: "동대구점 다원시스템",        status: "진행", product: "납품",             serial: "정착기",   process_date: "2026/04/29", receiver: "조이준",  kind2: "일반" },
  { seq_no: 54821, order_no: "260429-6",  branch: "대구", cu_name: "이안테크(2공장)",            status: "진행", product: "임대출장",         serial: "5800",     process_date: "2026/04/29", receiver: "조이준",  kind2: "일반" },
  { seq_no: 54820, order_no: "260429-5",  branch: "대구", cu_name: "위더스(광영점)백계문",       status: "완료", product: "토너납품",         serial: "5455",     process_date: "2026/04/29", receiver: "우은숙",  kind2: "일반" },
  { seq_no: 54819, order_no: "260429-4",  branch: "대구", cu_name: "중앙솔루션",                 status: "완료", product: "토너납품",         serial: "5244",     process_date: "2026/04/29", receiver: "우은숙",  kind2: "일반" },
  { seq_no: 54818, order_no: "260429-3",  branch: "대구", cu_name: "최수정 SW팜",                status: "진행", product: "임대출장",         serial: "8710",     process_date: "2026/04/29", receiver: "조이준",  kind2: "일반" },
  { seq_no: 54817, order_no: "260429-2",  branch: "대구", cu_name: "이안테크(2공장)",            status: "출고", product: "임대출장",         serial: "251CI",    process_date: "2026/04/29", receiver: "조이준",  kind2: "일반" },
  { seq_no: 54816, order_no: "260429-1",  branch: "대구", cu_name: "신독",                       status: "진행", product: "PC 납품",          serial: "조립",     process_date: "2026/04/29", receiver: "조이준",  kind2: "일반" },
  { seq_no: 54815, order_no: "260428-10", branch: "대구", cu_name: "더채움 언어심리지원",        status: "진행", product: "임대초기설치",     serial: "엡손",     process_date: "2026/04/29", receiver: "우은숙",  kind2: "일반" },
  { seq_no: 54814, order_no: "260428-9",  branch: "대구", cu_name: "송원ENG",                    status: "출고", product: "PC 출장요청",      serial: "조립",     process_date: "2026/04/28", receiver: "김상환",  kind2: "일반" },
  { seq_no: 54813, order_no: "260428-8",  branch: "대구", cu_name: "위더스(부산연제)정성",       status: "출고", product: "토너납품",         serial: "057H 외",  process_date: "2026/04/28", receiver: "우은숙",  kind2: "일반" },
  { seq_no: 54812, order_no: "260428-7",  branch: "대구", cu_name: "동대구점 다원시스템",        status: "완료", product: "토너납품",         serial: "510S",     process_date: "2026/04/28", receiver: "우은숙",  kind2: "일반" },
  { seq_no: 54811, order_no: "260428-6",  branch: "대구", cu_name: "남해주택건설",               status: "완료", product: "납품",             serial: "A4",       process_date: "2026/04/29", receiver: "김상환",  kind2: "일반" },
  { seq_no: 54810, order_no: "260428-5",  branch: "대구", cu_name: "김용부면장님",               status: "출고", product: "임대초기설치",     serial: "PC외",     process_date: "2026/04/28", receiver: "조이준",  kind2: "일반" },
];

let ORDERS   = [];
let FILTERED = [];
const PAGE_SIZE = 15;          // 원본과 동일하게 15건/페이지
let CURRENT_PAGE = 1;

function getUserOrders() {
  try { return JSON.parse(localStorage.getItem("user_orders") || "[]"); }
  catch (e) { return []; }
}

function getDeletedSet() {
  try {
    return new Set(JSON.parse(localStorage.getItem("deleted_orders") || "[]").map(String));
  } catch (e) { return new Set(); }
}

function mergeUser() {
  const u = getUserOrders();
  const deleted = getDeletedSet();
  const map = new Map();
  ORDERS.forEach(o => {
    const k = String(o.seq_no);
    if (!deleted.has(k)) map.set(k, { ...o, seq_no: o.seq_no });
  });
  u.forEach(o => {
    const k = String(o.seq_no);
    if (deleted.has(k)) return;
    const existing = map.get(k) || { seq_no: o.seq_no };
    // 원본 필드를 유지하면서 user 변경분(빈 값 제외)을 덮어씀
    const overlay = {};
    for (const key of Object.keys(o)) {
      if (o[key] !== "" && o[key] != null) overlay[key] = o[key];
    }
    map.set(k, { ...existing, ...overlay });
  });
  ORDERS = [...map.values()].sort((a, b) => Number(b.seq_no) - Number(a.seq_no));
}

async function load() {
  try {
    const r = await fetch("data/orders.json?ts=" + Date.now());
    if (r.ok) {
      ORDERS = await r.json();
    } else {
      ORDERS = FALLBACK_ORDERS;
    }
  } catch (e) {
    ORDERS = FALLBACK_ORDERS;
  }
  mergeUser();
  const initStatus = new URLSearchParams(location.search).get("status") || "";
  setStatus(initStatus);
  loadStatus();
  setInterval(loadStatus, 5000);
}

async function loadStatus() {
  try {
    const r = await fetch("data/harvest_orders_status.json?ts=" + Date.now());
    if (!r.ok) return;
    const s = await r.json();
    const el = document.getElementById("harvestStatus");
    if (s.phase === "done") {
      el.innerHTML = `자동 수집 완료 (${s.total_orders}건) · ${s.updated_at}`;
      el.style.color = "#080";
    } else {
      el.innerHTML = `<span style="color:#c60;">● 자동 수집중</span> 페이지 ${s.page} / 누적 ${s.total_orders}건`;
    }
    if (s.total_orders > ORDERS.length - getUserOrders().length) {
      const r2 = await fetch("data/orders.json?ts=" + Date.now());
      if (r2.ok) {
        ORDERS = await r2.json();
        mergeUser();
        applyFilter();
      }
    }
  } catch (e) {}
}

function setStatus(v) {
  document.querySelectorAll("input[name='re_now']").forEach(r => { r.checked = (r.value === v); });
  document.querySelectorAll("#statusTabs a").forEach(a => {
    a.classList.toggle("active", (a.dataset.status || "") === v);
  });
  applyFilter();
}
window.setStatus = setStatus;

function bindStatusTabs() {
  document.querySelectorAll("#statusTabs a").forEach(a => {
    a.addEventListener("click", e => {
      e.preventDefault();
      setStatus(a.dataset.status || "");
    });
  });
}
if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", bindStatusTabs);
} else {
  bindStatusTabs();
}

function getStatus() {
  const el = document.querySelector("input[name='re_now']:checked");
  return el ? el.value : "";
}

function applyFilter() {
  const f = document.getElementById("f_name").value;
  const q = document.getElementById("f_value").value.trim().toLowerCase();
  const s = getStatus();
  FILTERED = ORDERS.filter(r => {
    if (s && r.status !== s) return false;
    if (q) {
      let v;
      if (f === "phone") {
        v = ((r.cu_tel || "") + " " + (r.cu_mobile || "")).toLowerCase();
      } else {
        v = (r[f] || "").toString().toLowerCase();
      }
      if (!v.includes(q)) return false;
    }
    return true;
  });
  CURRENT_PAGE = 1;
  draw();
}

function resetFilter() {
  document.getElementById("f_name").value = "cu_name";
  document.getElementById("f_value").value = "";
  setStatus("");
}

function draw() {
  const tb = document.getElementById("orderBody");
  document.getElementById("hitCount").textContent = FILTERED.length.toLocaleString();
  if (!FILTERED.length) {
    tb.innerHTML = "<tr><td colspan='9'>검색 결과가 없습니다.</td></tr>";
    document.getElementById("pageInfo").textContent = "";
    document.getElementById("pager").innerHTML = "";
    return;
  }
  const total = FILTERED.length;
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  if (CURRENT_PAGE > totalPages) CURRENT_PAGE = totalPages;
  const start = (CURRENT_PAGE - 1) * PAGE_SIZE;
  const slice = FILTERED.slice(start, start + PAGE_SIZE);

  tb.innerHTML = slice.map(r => `
    <tr>
      <td><a href="order-detail.html?seq_no=${r.seq_no}">${esc(r.order_no)}</a></td>
      <td>${esc(r.kind2)}</td>
      <td class="st-${esc(r.status)}">${esc(r.status)}</td>
      <td class="cu" title="${esc(r.cu_name)}">${esc(r.cu_name)}</td>
      <td class="product"><a href="order-detail.html?seq_no=${r.seq_no}">${esc(r.product)}</a></td>
      <td>${esc(r.serial)}</td>
      <td>${esc(r.process_date)}</td>
      <td>${esc(r.receiver)}</td>
      <td><a href="javascript:godel('${r.seq_no}')">삭제</a></td>
    </tr>
  `).join("");

  document.getElementById("pageInfo").textContent =
    `${(start + 1).toLocaleString()}-${Math.min(start + PAGE_SIZE, total).toLocaleString()} / ${total.toLocaleString()}건 (전체 ${ORDERS.length.toLocaleString()}건 중)`;

  drawPager(totalPages);
}

function drawPager(total) {
  const p = document.getElementById("pager");
  if (total <= 1) { p.innerHTML = ""; return; }
  let html = "";
  const cur = CURRENT_PAGE, win = 5;
  const from = Math.max(1, cur - win), to = Math.min(total, cur + win);
  if (cur > 1) html += `<a href="javascript:goPage(1)">[처음]</a> <a href="javascript:goPage(${cur-1})">[이전]</a> `;
  for (let i = from; i <= to; i++) {
    html += i === cur ? ` <b style="color:#0000ff">${i}</b> ` : ` <a href="javascript:goPage(${i})">${i}</a> `;
  }
  if (cur < total) html += ` <a href="javascript:goPage(${cur+1})">[다음]</a> <a href="javascript:goPage(${total})">[맨끝]</a>`;
  p.innerHTML = html;
}

function goPage(n) { CURRENT_PAGE = n; draw(); window.scrollTo(0, 0); }
function godel(id) {
  if (!confirm("정말로 삭제하시겠습니까??")) return;
  const u = getUserOrders();
  const next = u.filter(o => String(o.seq_no) !== String(id));
  localStorage.setItem("user_orders", JSON.stringify(next));
  const deleted = JSON.parse(localStorage.getItem("deleted_orders") || "[]");
  if (!deleted.includes(String(id))) {
    deleted.push(String(id));
    localStorage.setItem("deleted_orders", JSON.stringify(deleted));
  }
  ORDERS = ORDERS.filter(o => String(o.seq_no) !== String(id));
  applyFilter();
  alert("삭제되었습니다.");
}
function esc(s) {
  return (s == null ? "" : String(s))
    .replace(/&/g, "&amp;").replace(/</g, "&lt;")
    .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

document.addEventListener("DOMContentLoaded", load);
document.addEventListener("keydown", e => {
  if (e.key === "Enter" && document.activeElement.id === "f_value") applyFilter();
});
</script>
</body>
</html>
