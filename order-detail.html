<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>A/S Admin - 접수 상세/수정</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/supabase-client.js"></script>
<script src="css/partials.js"></script>
<script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
<style>
  .info-bar {
    width: 800px; margin: 8px auto 0;
    background: #eeeeee; padding: 6px 10px;
    border: 1px solid #ccc;
    display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
    box-sizing: border-box;
  }
  .info-bar .badge {
    padding: 2px 10px; border: 1px solid #999;
    font-weight: bold;
  }
  .data-warning {
    width: 800px; margin: 12px auto;
    background: #fff8db; border: 1px solid #e0c54e;
    padding: 12px; text-align: center; color: #855;
    border-radius: 4px;
  }
  /* 읽기 전용 영역 - 깔끔한 텍스트 표시 */
  .view-table input[readonly] {
    background: transparent;
    border: 0;
    border-bottom: 1px dotted #ddd;
    color: #222;
    padding: 2px 4px;
    font-weight: 500;
    cursor: default;
  }
  .view-table input[readonly]:focus { outline: none; }
  .view-table input[readonly][value=""] { border-bottom-color: transparent; }
  .view-table textarea[readonly] {
    cursor: default;
  }

  /* ---------- 견적서 인쇄: A4 1장 ---------- */
  @media print {
    @page { size: A4 portrait; margin: 8mm; }
    html, body { background: #fff !important; }
    body { font-size: 10.5px; }
    /* 인쇄에서 제외 */
    .app-header, .app-footer,
    .btn-row, .data-warning,
    .print-hide {
      display: none !important;
    }

    .content-wrap { width: 100% !important; padding: 0 !important; margin: 0 !important; }
    .page-title {
      width: 100% !important; height: auto !important;
      padding: 4px 8px !important; font-size: 13px !important;
      background: #000068 !important; color: #fff !important;
      -webkit-print-color-adjust: exact; print-color-adjust: exact;
    }
    .info-bar {
      width: 100% !important; margin: 4px 0 6px 0 !important;
      padding: 4px 8px !important; font-size: 10.5px !important;
      gap: 8px !important;
    }
    .form-table { width: 100% !important; font-size: 10.5px !important; page-break-inside: avoid; }
    .form-table th, .form-table td {
      padding: 2px 5px !important; line-height: 1.25 !important;
    }
    .form-table th {
      -webkit-print-color-adjust: exact; print-color-adjust: exact;
    }
    .view-table input[readonly], .view-table input {
      border: 0 !important; background: transparent !important;
      padding: 0 2px !important; font-size: 10.5px !important;
    }
    .view-table textarea {
      background: transparent !important; border: 1px solid #ccc !important;
      font-size: 10.5px !important; resize: none;
    }
    /* 기존의견 박스 — 인쇄 시 슬림하게 */
    #reContentView {
      min-height: 0 !important;
      background: transparent !important;
      border: 0 !important;
      padding: 2px 4px !important;
      font-size: 10.5px !important;
      line-height: 1.3 !important;
    }
    /* 라디오 — 선택된 값만 표시되도록 회색 처리 (시각적 압축) */
    input[type="radio"] { transform: scale(0.85); }
  }
</style>
<script>
let CURRENT = null;

function getSeqNo() {
  const p = new URLSearchParams(location.search);
  return p.get("seq_no");
}

function formatPhone(raw, isMobile) {
  const d = (raw || "").replace(/\D/g, "");
  if (d.length <= 3) return d;
  if (isMobile) {
    if (d.length <= 7) return d.slice(0,3) + "-" + d.slice(3);
    return d.slice(0,3) + "-" + d.slice(3,7) + "-" + d.slice(7,11);
  }
  if (d.length <= 6) return d.slice(0,3) + "-" + d.slice(3);
  if (d.length <= 10) return d.slice(0,3) + "-" + d.slice(3, d.length-4) + "-" + d.slice(-4);
  return d.slice(0,3) + "-" + d.slice(3,7) + "-" + d.slice(7,11);
}
function formatPhoneFinal(raw, isMobile) {
  let d = (raw || "").replace(/\D/g, "");
  if (!isMobile && d.length === 7) d = "053" + d;
  return formatPhone(d, isMobile);
}

function formatBizNo(raw) {
  const d = (raw || "").replace(/\D/g, "");
  if (d.length <= 3) return d;
  if (d.length <= 5) return d.slice(0,3) + "-" + d.slice(3);
  return d.slice(0,3) + "-" + d.slice(3,5) + "-" + d.slice(5,10);
}

function cleanReContent(s) {
  if (!s) return "";
  return s
    .replace(/<br\s*\/?>/gi, "\n")
    .replace(/<[^>]+>/g, "")
    .replace(/&nbsp;/g, " ")
    .replace(/&amp;/g, "&")
    .replace(/&lt;/g, "<")
    .replace(/&gt;/g, ">")
    .replace(/&quot;/g, '"')
    .replace(/&#039;/g, "'")
    .replace(/\r\n/g, "\n")
    .replace(/\n{3,}/g, "\n\n")
    .trim();
}

async function load() {
  const seq = getSeqNo();
  if (!seq) {
    document.getElementById("dataWarn").innerHTML =
      '접수번호가 지정되지 않았습니다. <a href="orders.html">목록으로</a>';
    document.getElementById("dataWarn").style.display = "block";
    return;
  }

  const diag = [];

  // Supabase 설정된 경우 — DB 1회 조회
  let order = null;
  let listOrder = null;
  if (window.SB_CONFIGURED) {
    try {
      const row = await window.dbOrderBySeq(seq);
      if (row) {
        order = row;
        listOrder = row; // 목록 + 상세 합쳐진 단일 행
        diag.push("✓ Supabase 에서 조회됨");
      } else {
        diag.push(`Supabase: seq=${seq} 없음`);
      }
    } catch (e) {
      diag.push(`Supabase 오류: ${e.message}`);
    }
  } else {
    if (location.protocol === "file:") {
      diag.push("⚠ <code>file://</code> 프로토콜로 열림 — 브라우저가 fetch 를 차단합니다. <code>http://localhost</code> 으로 접속하세요.");
    }
    // 1) localStorage 의 신규 등록 분
    const u = JSON.parse(localStorage.getItem("user_orders") || "[]");
    order = u.find(o => String(o.seq_no) === String(seq));
    if (order) diag.push("✓ localStorage 에서 발견");

    // 2) 상세 수집 데이터
    if (!order) {
      try {
        const r = await fetch("data/order_details.json?ts=" + Date.now());
        diag.push(`order_details.json fetch: status=${r.status}, ok=${r.ok}`);
        if (r.ok) {
          const all = await r.json();
          order = all[seq];
        }
      } catch (e) {
        diag.push(`order_details.json error: ${e.message}`);
      }
    }
    // 3) 목록 데이터 (요약)
    try {
      const r = await fetch("data/orders.json?ts=" + Date.now());
      if (r.ok) {
        const orders = await r.json();
        listOrder = orders.find(o => String(o.seq_no) === String(seq));
      }
    } catch (e) {
      diag.push(`orders.json error: ${e.message}`);
    }
  }

  if (!order && listOrder) {
    document.getElementById("dataWarn").innerHTML =
      '⚠ 이 접수의 상세 정보는 아직 수집 중입니다. 목록의 요약 정보만 표시됩니다.<br>' +
      '<small>잠시 후 새로고침하시면 전체 정보가 나타납니다.</small>';
    document.getElementById("dataWarn").style.display = "block";
    order = {
      seq_no: listOrder.seq_no,
      cu_name: listOrder.cu_name,
      mo_engname: listOrder.product,
      mo_serial: listOrder.serial,
      re_now: listOrder.status,
      work_name: listOrder.receiver,
      or_kind3: listOrder.kind2,
    };
  }

  if (!order) {
    document.getElementById("dataWarn").innerHTML =
      `해당 접수번호 (#${seq}) 의 데이터를 찾을 수 없습니다.<br>` +
      '<small style="display:block;margin-top:8px;text-align:left;font-family:monospace;">' +
      diag.map(d => "· " + d).join("<br>") + '</small>' +
      '<a href="orders.html">목록으로</a>';
    document.getElementById("dataWarn").style.display = "block";
    return;
  }

  CURRENT = { ...order, seq_no: seq };
  populate(CURRENT, listOrder);
}

function populate(o, listOrder) {
  const f = document.frm;
  const set = (name, val) => {
    if (f[name]) f[name].value = val == null ? "" : val;
  };
  const setRadio = (name, val) => {
    const el = document.querySelector(`input[name="${name}"][value="${val}"]`);
    if (el) el.checked = true;
  };

  set("cu_name",  o.cu_name);
  set("co_name",  o.co_name);
  set("cu_mail",  o.cu_mail);
  set("zipcode1", o.zipcode1 || o.zipcode || "");
  set("address1", o.address1);
  set("address2", o.address2);
  set("cu_kind", o.cu_kind);  // 임대제품 (text input)

  set("cu_tel",    formatPhoneFinal(o.cu_tel,    false));
  set("co_tel",    formatBizNo(o.co_tel));
  set("cu_mobile", formatPhoneFinal(o.cu_mobile, true));
  set("co_fax",    formatPhoneFinal(o.co_fax,    false));

  set("mo_number",   o.mo_number);
  set("mo_engname",  o.mo_engname || o.product);
  set("mo_serial",   o.mo_serial || o.serial);
  set("mo_srfr",     o.mo_srfr);

  set("cu_want",     o.cu_want);
  set("re_content",  o.re_content);
  set("re_content2", "");
  const view = document.getElementById("reContentView");
  if (view) {
    const cleaned = cleanReContent(o.re_content);
    view.textContent = cleaned || "(이전 처리 의견 없음)";
  }

  const currentUser = localStorage.getItem("current_user") || "관리자";
  set("work_name", currentUser);

  let kind3 = o.or_kind3 || o.kind2 || "";
  if (kind3 === "일반") kind3 = "출장";
  if (kind3 === "방문") kind3 = "내방";
  setRadio("or_kind3", kind3);
  const k3el = document.getElementById("readonlyKind3");
  if (k3el) k3el.textContent = kind3 || "-";
  setRadio("or_kind2", o.or_kind2);
  setRadio("re_now",   o.re_now || o.status);

  // 헤더 정보
  const status = o.re_now || o.status || "접수";
  document.getElementById("orderNo").textContent     = o.order_no || (listOrder && listOrder.order_no) || ("#" + o.seq_no);
  const sb = document.getElementById("statusBadge");
  sb.textContent = "현재상태: " + status;
  sb.className = "badge st-" + status;
  document.getElementById("orderDate").textContent     = o.process_date || (listOrder && listOrder.process_date) || "";
  document.getElementById("orderReceiver").textContent = o.work_name || o.receiver || (listOrder && listOrder.receiver) || "";

  if (status === "출고") lockForm();
}

function lockForm() {
  const f = document.frm;
  if (f) {
    f.querySelectorAll("input[name='re_now']").forEach(el => el.disabled = true);
    f.querySelectorAll("input[name='or_kind3']").forEach(el => el.disabled = true);
    if (f.work_name)   f.work_name.disabled   = true;
    if (f.re_content2) f.re_content2.disabled = true;
  }
  const saveBtn = document.querySelector('button[onclick="save()"]');
  if (saveBtn) {
    saveBtn.disabled = true;
    saveBtn.style.opacity = "0.4";
    saveBtn.style.cursor = "not-allowed";
    saveBtn.title = "출고 완료된 건은 수정할 수 없습니다";
  }
  if (!document.getElementById("lockNotice")) {
    const notice = document.createElement("div");
    notice.id = "lockNotice";
    notice.style.cssText = "max-width:730px;margin:8px auto;padding:10px 14px;background:#fee;border:1px solid #f66;border-radius:4px;color:#900;font-size:13px;font-weight:bold;text-align:center;";
    notice.textContent = "[출고 완료] 이미 출고 처리된 건은 수정할 수 없습니다.";
    const form = document.querySelector('form[name="frm"]');
    if (form && form.parentElement) form.parentElement.insertBefore(notice, form);
  }
}

async function save() {
  if (!CURRENT) { alert("로딩이 완료되지 않았습니다."); return; }
  if ((CURRENT.re_now || CURRENT.status || "").trim() === "출고") {
    alert("이미 출고 처리된 건은 수정할 수 없습니다.");
    return;
  }
  const f = document.frm;
  const radio = name => {
    const el = document.querySelector(`input[name="${name}"]:checked`);
    return el ? el.value : "";
  };
  const u = (!window.SB_CONFIGURED) ? JSON.parse(localStorage.getItem("user_orders") || "[]") : [];
  let idx = -1;
  if (!window.SB_CONFIGURED) {
    idx = u.findIndex(o => String(o.seq_no) === String(CURRENT.seq_no));
    if (idx < 0) { u.push({ ...CURRENT }); idx = u.length - 1; }
  }
  const o = window.SB_CONFIGURED ? { ...CURRENT, seq_no: Number(CURRENT.seq_no) } : u[idx];
  o.cu_name      = f.cu_name.value;
  o.co_name      = f.co_name.value;
  o.cu_mail      = f.cu_mail.value;
  o.address1     = f.address1.value;
  o.address2     = f.address2.value;
  o.zipcode1     = f.zipcode1.value;
  o.cu_tel       = (f.cu_tel.value || "").trim();
  o.cu_mobile    = (f.cu_mobile.value || "").trim();
  o.cu_kind      = f.cu_kind.value;  // 임대제품
  o.mo_serial    = f.mo_serial.value;
  o.cu_want      = f.cu_want.value;
  const prev = (o.re_content || "").trim();
  const add  = f.re_content2.value.trim();
  const reNowEl = document.querySelector("input[name='re_now']:checked");
  const reNow = reNowEl ? reNowEl.value : "";
  const reNowOrig = (CURRENT.re_now || CURRENT.status || "").trim();
  const STAMP_STATUSES = ["진행","센터","견적","택배","완료","출고"];
  const statusBecameStampWorthy = STAMP_STATUSES.includes(reNow) && reNow !== reNowOrig;
  if (add || statusBecameStampWorthy) {
    const n = new Date();
    const pad = x => String(x).padStart(2, "0");
    const author = f.work_name.value || "관리자";
    const head = `${pad(n.getMonth()+1)}월 ${pad(n.getDate())}일 ${pad(n.getHours())}시 ${pad(n.getMinutes())}분  ${author} 기사의 의견 : ${reNow}`;
    const stamp = add ? `${head}<br>${add}<br>` : `${head}<br>`;
    const sep = (prev && !/<br\s*\/?\s*>\s*$/i.test(prev)) ? "<br>" : "";
    o.re_content = prev ? prev + sep + stamp : stamp;
  } else {
    o.re_content = prev;
  }
  o.work_name    = f.work_name.value;
  o.receiver     = f.work_name.value;
  o.or_kind3     = radio("or_kind3"); o.kind2 = o.or_kind3 || "출장";
  o.re_now       = radio("re_now"); o.status = o.re_now;
  if (window.SB_CONFIGURED) {
    delete o.created_at; delete o.updated_at;
    const res = await window.dbOrderUpsert(o);
    if (res?.error) { alert("저장 실패: " + res.error); return; }
  } else {
    u[idx] = o;
    localStorage.setItem("user_orders", JSON.stringify(u));
  }
  alert("저장되었습니다.");
  location.href = "orders.html";
}

async function del() {
  if (!CURRENT) return;
  if (!confirm("정말로 삭제하시겠습니까?")) return;
  if (window.SB_CONFIGURED) {
    const res = await window.dbOrderDelete(CURRENT.seq_no);
    if (res?.error) { alert("삭제 실패: " + res.error); return; }
  } else {
    const u = JSON.parse(localStorage.getItem("user_orders") || "[]");
    const next = u.filter(o => String(o.seq_no) !== String(CURRENT.seq_no));
    localStorage.setItem("user_orders", JSON.stringify(next));
    const deleted = JSON.parse(localStorage.getItem("deleted_orders") || "[]");
    if (!deleted.includes(String(CURRENT.seq_no))) {
      deleted.push(String(CURRENT.seq_no));
      localStorage.setItem("deleted_orders", JSON.stringify(deleted));
    }
  }
  alert("삭제되었습니다.");
  location.href = "orders.html";
}

function printEstimate() { window.print(); }
function searchZip() {
  if (typeof daum === "undefined") { alert("Daum 우편번호 서비스를 불러오지 못했습니다."); return; }
  new daum.Postcode({
    oncomplete: data => {
      const fullAddr = data.roadAddress || data.jibunAddress || "";
      let extra = "";
      if (data.userSelectedType === "R") {
        if (data.bname) extra += data.bname;
        if (data.buildingName) extra += (extra ? ", " : "") + data.buildingName;
      }
      document.frm.zipcode1.value = data.zonecode;
      document.frm.address1.value = fullAddr + (extra ? " (" + extra + ")" : "");
      document.frm.address2.focus();
    }
  }).open();
}

document.addEventListener("DOMContentLoaded", async () => {
  load();
  // 관리자만 삭제 버튼 노출
  if (typeof window.currentIsAdmin === "function") {
    try {
      if (await window.currentIsAdmin()) {
        document.querySelectorAll(".admin-only-btn").forEach(b => b.style.display = "");
      }
    } catch (e) {}
  }
});
</script>
</head>
<body>
<div class="app">
  <header class="app-header" id="app-header"></header>

  <main class="app-main">
    <div class="content-wrap">
      <div class="page-title">A/S 접수 상세 / 수정</div>

      <div id="dataWarn" class="data-warning" style="display:none;"></div>

      <div class="info-bar">
        접수번호 <b id="orderNo">-</b> &nbsp;|&nbsp;
        <span id="statusBadge" class="badge">상태 -</span> &nbsp;|&nbsp;
        등록일 <span id="orderDate">-</span> &nbsp;|&nbsp;
        처리자 <span id="orderReceiver">-</span>
      </div>

      <form name="frm" onsubmit="event.preventDefault();save();">
      <table class="form-table view-table">
        <tr><th colspan="4" style="background:#bbbbff;">고객정보</th></tr>
        <tr>
          <th>고객명</th>
          <td><input type="text" name="cu_name" size="14" readonly></td>
          <th class="m-hide">임대제품</th>
          <td class="m-hide"><input type="text" name="cu_kind" size="22" readonly></td>
        </tr>
        <tr class="m-hide">
          <th>주판매</th>
          <td><input type="text" name="co_name" size="20" readonly></td>
          <th>이메일</th>
          <td><input type="text" name="cu_mail" size="22" readonly></td>
        </tr>
        <tr>
          <th>전화번호</th>
          <td><input type="text" name="cu_tel" size="20" readonly></td>
          <th class="m-hide">사업자번호</th>
          <td class="m-hide"><input type="text" name="co_tel" size="20" readonly></td>
        </tr>
        <tr>
          <th>휴대폰</th>
          <td><input type="text" name="cu_mobile" size="20" readonly></td>
          <th class="m-hide">팩스</th>
          <td class="m-hide"><input type="text" name="co_fax" size="20" readonly></td>
        </tr>
        <tr>
          <th>주소</th>
          <td colspan="3">
            <input type="text" name="zipcode1" size="8" readonly>
            <input type="text" name="address1" size="50" readonly style="margin-left:4px;"><br>
            <input type="text" name="address2" size="60" readonly placeholder="상세주소" style="margin-top:4px;">
          </td>
        </tr>

        <tr><th colspan="4" style="background:#bbbbff;">상품정보</th></tr>
        <tr class="m-hide">
          <th>상품 코드</th>
          <td><input type="text" name="mo_number" size="14" readonly></td>
          <th>상품명</th>
          <td><input type="text" name="mo_engname" size="22" readonly></td>
        </tr>
        <tr class="m-hide">
          <th>시리얼번호</th>
          <td><input type="text" name="mo_serial" size="14" readonly></td>
          <th>제조사</th>
          <td><input type="text" name="mo_srfr" size="22" readonly></td>
        </tr>
        <tr>
          <th>요청방법</th>
          <td colspan="3">
            <label><input type="radio" name="or_kind3" value="출장">출장</label>&nbsp;
            <label><input type="radio" name="or_kind3" value="택배">택배</label>&nbsp;
            <label><input type="radio" name="or_kind3" value="내방">내방</label>
          </td>
        </tr>
        <tr>
          <th>고객 요청사항</th>
          <td colspan="3"><textarea name="cu_want" rows="6" style="width:100%;background:#f8f8f8;border:1px solid #e0e0e0;color:#333;" readonly></textarea></td>
        </tr>

        <tr><th colspan="4" style="background:#bbbbff;">처리정보</th></tr>
        <tr>
          <th>현재 상태</th>
          <td colspan="3">
            <label><input type="radio" name="re_now" value="접수">접수</label>
            <label><input type="radio" name="re_now" value="진행">진행</label>
